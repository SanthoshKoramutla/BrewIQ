<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1200" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 628px;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: linear-gradient(135deg, #1a1209 0%, #2d1f0e 50%, #1a1209 100%);
    color: #fff;
    position: relative;
  }

  /* Subtle texture overlay */
  body::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 800px 400px at 30% 50%, rgba(245,159,11,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 400px 300px at 80% 20%, rgba(245,159,11,0.05) 0%, transparent 60%);
    pointer-events: none;
  }

  .container {
    position: relative;
    width: 1200px;
    height: 628px;
    padding: 56px 72px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  /* Top bar */
  .top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }

  .brand {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-icon {
    width: 52px;
    height: 52px;
    background: linear-gradient(135deg, #f59e0b, #d97706);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    flex-shrink: 0;
  }

  .logo-text {
    font-size: 42px;
    font-weight: 800;
    letter-spacing: -1px;
    color: #fff;
  }

  .logo-text span {
    color: #f59e0b;
  }

  .by-line {
    font-size: 14px;
    color: #a07850;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-left: 66px;
  }

  .badge-ai {
    background: rgba(245,159,11,0.15);
    border: 1px solid rgba(245,159,11,0.3);
    color: #f59e0b;
    font-size: 13px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 999px;
    letter-spacing: 0.04em;
  }

  /* Center content */
  .center {
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  .tagline {
    font-size: 58px;
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -2px;
    color: #fff;
    max-width: 800px;
  }

  .tagline .highlight {
    color: #f59e0b;
  }

  .description {
    font-size: 22px;
    color: #c4a47a;
    font-weight: 400;
    line-height: 1.5;
    max-width: 680px;
  }

  /* Pills */
  .pills {
    display: flex;
    gap: 12px;
    flex-wrap: nowrap;
  }

  .pill {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    color: #e8d5b5;
    font-size: 15px;
    font-weight: 500;
    padding: 8px 20px;
    border-radius: 999px;
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }

  .pill .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #f59e0b;
    flex-shrink: 0;
  }

  /* Bottom */
  .bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .stat-row {
    display: flex;
    gap: 36px;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat-value {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
  }

  .stat-label {
    font-size: 13px;
    color: #a07850;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .domain {
    font-size: 16px;
    color: #6b4c2a;
    font-weight: 500;
    letter-spacing: 0.02em;
  }

  /* Decorative coffee ring */
  .deco-ring {
    position: absolute;
    right: -80px;
    top: 50%;
    transform: translateY(-50%);
    width: 400px;
    height: 400px;
    border-radius: 50%;
    border: 60px solid rgba(245,159,11,0.04);
    pointer-events: none;
  }

  .deco-ring-2 {
    position: absolute;
    right: -160px;
    top: 50%;
    transform: translateY(-50%);
    width: 560px;
    height: 560px;
    border-radius: 50%;
    border: 40px solid rgba(245,159,11,0.025);
    pointer-events: none;
  }
</style>
</head>
<body>
  <div class="deco-ring"></div>
  <div class="deco-ring-2"></div>

  <div class="container">
    <div class="top">
      <div class="brand">
        <div class="logo">
          <div class="logo-icon">☕</div>
          <div class="logo-text">Brew<span>IQ</span></div>
        </div>
        <div class="by-line">by Dhinova AI</div>
      </div>
      <div class="badge-ai">✦ Powered by AI</div>
    </div>

    <div class="center">
      <div class="tagline">
        AI Analytics for<br/>
        <span class="highlight">Coffee Shops</span>
      </div>
      <div class="description">
        Upload your POS data · ask in plain English<br/>
        get instant insights — no dashboards, no SQL.
      </div>
      <div class="pills">
        <div class="pill"><span class="dot"></span>Upload POS Data</div>
        <div class="pill"><span class="dot"></span>Ask in English</div>
        <div class="pill"><span class="dot"></span>Get Instant Insights</div>
      </div>
    </div>

    <div class="bottom">
      <div class="stat-row">
        <div class="stat">
          <div class="stat-value">$81K+</div>
          <div class="stat-label">Revenue Tracked</div>
        </div>
        <div class="stat">
          <div class="stat-value">17K+</div>
          <div class="stat-label">Transactions</div>
        </div>
        <div class="stat">
          <div class="stat-value">80+</div>
          <div class="stat-label">Products Analyzed</div>
        </div>
      </div>
      <div class="domain">brew.dhinovaai.com</div>
    </div>
  </div>
</body>
</html>
